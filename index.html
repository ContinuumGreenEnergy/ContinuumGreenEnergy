<!-- ═══════════════════════════════════════════════════════════════
     INLINED VIEW PARTIALS — SINGLE-FILE MODE
     Every file from views/ is embedded below as an inert <template>.
     loader.js reads these instead of fetch()-ing over the network, so
     the dashboard runs from file://, GitHub Pages, Netlify, or Firebase
     Hosting with ZERO configuration and NO local web server.
     (The views/ folder is kept in the repo as the editable source; if
     you change a partial, re-run tools/inline_views.py to refresh this
     block, or just delete the matching <template> to use the dev
     fetch() fallback with a local server.)
     ═══════════════════════════════════════════════════════════════ -->
<template data-partial="views/login.html">
<div id="lw" class="lw" style="display:none;">
  <div class="lb">
    <div class="li" id="l-i">🔐</div>
    <div class="lt" id="l-t">Edit Access — Login</div>
    <div class="ls" id="l-s">
      Enter the credentials for this section to enable edits in this tab.
    </div>

    <div class="fg" style="text-align:left;margin-top:4px;">
      <label class="fl">Username</label>
      <input class="fi" id="l-u" type="text" autocomplete="username" placeholder="e.g. solar_user">
    </div>
    <div class="fg" style="text-align:left;">
      <label class="fl">Password</label>
      <input class="fi" id="l-p" type="password" autocomplete="current-password"
             placeholder="••••••••"
             onkeydown="if(event.key==='Enter')auth.doLoginForm()">
    </div>

    <div class="le" id="l-e"></div>

    <div style="display:flex;gap:7px;margin-top:7px;">
      <button class="btn"     style="flex:1;" onclick="auth.closeLogin()">Cancel</button>
      <button class="btn bta" style="flex:1;" data-role="submit" onclick="auth.doLoginForm()">Unlock Edits</button>
    </div>

    <div style="margin-top:9px;padding:8px 10px;background:var(--card3);border-radius:6px;
                font-size:9px;color:var(--t3);text-align:left;line-height:1.6;">
      <b style="color:var(--t2);">Demo accounts (role-based access)</b><br>
      • Solar: <code>solar_user</code> / <code>Solar@123</code><br>
      • WTG: <code>wtg_user</code> / <code>Wtg@123</code><br>
      • BOP: <code>bop_user</code> / <code>Bop@123</code><br>
      • Land: <code>land_user</code> / <code>Land@123</code><br>
      • Site Manager: <code>site_user</code> / <code>Site@123</code> (full access)
      <br><br>
      <b>Demo build — not real authentication.</b> Anyone with browser DevTools can bypass this gate.
      Treat as a UX boundary, not a security one.
    </div>
  </div>
</div>

</template>

<template data-partial="views/view-home.html">
<!-- ════ HOME DASHBOARD ════ -->
<div class="view on" id="view-home">

  <!-- ── HEADER ── -->
  <div class="dash-header">
    <div class="dash-logo">
      <img src="continuumlogo.png" style="height:52px;object-fit:contain;" onerror="this.style.display='none'">

    </div>
    <div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;">

      <div style="font-size:8px;color:var(--t3);" id="last-saved-ts">💾 Auto-save active</div>
    </div>
  </div>

  <!-- ── STICKY SECTION NAV ── -->
  <div class="adv-sec-nav" id="home-secnav">
    <div class="sni act" onclick="sniClick(this,'home-kpi-row',event)">📊 KPIs</div>
    <div class="sni"     onclick="sniClick(this,'home-work-table-wrap',event)">📋 Daily Work Table</div>
    <div class="sni"     onclick="sniClick(this,'home-live-viz',event)">📡 Live Charts</div>
    <div class="sni"     onclick="sniClick(this,'home-row3',event)">🚧 Row Tracker &amp; S-Curve</div>
    <div class="sni"     onclick="sniClick(this,'home-gantt-wrap',event)">📅 Gantt</div>
  </div>

  <!-- ── DATE PICKER (daily snapshot view) ── -->
  <div id="home-dp-bar"></div>

  <!-- ── ROW 1: KPI CARDS ── -->
  <div class="sq-kpi-row" id="home-kpi-row" style="scroll-margin-top:100px;"></div>

  <!-- ── ROW 2: DAILY WORK TABLE (replaces previous chart-strip) ──
       4-column read-only table fed by /pod + /pod-status.
       Columns: POD | Live / Today's Work | Pending & Remarks | Next Day Plan
       All editing controls live on the location subpages (Solar / WTG / BOP).
  -->
  <div class="pnl" id="home-work-table-wrap" style="margin-bottom:14px;scroll-margin-top:100px;padding:16px 18px;">
    <div class="ph2" style="margin-bottom:14px;">
      <div class="pt" style="font-weight:800;font-size:17px;letter-spacing:.2px;">📋 Daily Work Status — Plan vs Live vs Pending vs Next Day</div>
      <span style="font-size:12px;color:var(--t2);font-weight:600;" id="home-work-table-date">—</span>
    </div>
    <div id="home-work-table"></div>
  </div>

  <!-- ── ROW 2.5: LIVE DATA VISUALISATION ──
       Auto-updating charts fed straight from the Firebase listeners:
       cumulative plan-vs-actual per module (dashed = planned, solid = actual),
       daily activity submitted/completed bars (7 days), manpower trend (7 days),
       and per-module photo-upload badges for this week.
       No refresh button exists because none is needed — every chart redraws
       the moment any progress entry, POD entry, or photo lands in Firebase.
  -->
  <div class="pnl" id="home-live-viz" style="margin-bottom:14px;padding:14px 16px;scroll-margin-top:100px;">
    <div class="ph2" style="margin-bottom:10px;">
      <div class="pt" style="font-weight:800;">📡 Live Data Visualisation — auto-updates as entries arrive</div>
      <span style="font-size:9px;color:var(--t3);">Fed live from Firebase · no refresh needed</span>
    </div>
    <div class="live-viz-grid">
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--t2);margin-bottom:5px;">📈 Cumulative Plan (dashed) vs Actual (solid) — per module, last 7 days</div>
        <div class="ch h280" style="position:relative;">
          <canvas id="ch-live-cum"></canvas>
          <div id="lv-cum-empty" class="lv-empty">No POD / progress entries in the last 7 days yet — submit a POD to see this chart move.</div>
        </div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--t2);margin-bottom:5px;">📊 Daily Activities — submitted vs completed (7 days)</div>
        <div class="ch h280" style="position:relative;">
          <canvas id="ch-live-daily"></canvas>
          <div id="lv-daily-empty" class="lv-empty">No activity submissions in the last 7 days yet — POD entries will appear here as they come in.</div>
        </div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--t2);margin-bottom:5px;">👷 Manpower Deployed — daily total (7 days)</div>
        <div class="ch h280" style="position:relative;">
          <canvas id="ch-live-mp"></canvas>
          <div id="lv-mp-empty" class="lv-empty">No manpower recorded in the last 7 days yet — the trend appears once POD entries include a manpower count.</div>
        </div>
      </div>
    </div>
    <div class="live-photo-badges" id="lv-photo-badges"></div>
  </div>

  <!-- ── ROW 3: Row Tracker | S-Curve | Milestones ──
       (POD & Daily Progress panel removed per requirement; replaced by Row Tracker.)
  -->
  <div id="home-row3" style="display:grid;grid-template-columns:1fr 1.3fr 0.9fr;gap:12px;margin-bottom:14px;scroll-margin-top:100px;">

    <!-- Row Tracker (replaces POD & Daily Progress) -->
    <div class="pnl" id="home-row-tracker" style="padding:12px 14px;"></div>

    <!-- Planned vs Actual S-Curve -->
    <div class="pnl" style="padding:12px 14px;">
      <div class="ph2">
        <div class="pt" style="font-weight:700;">📈 Planned vs Actual — S-Curve</div>
        <span style="font-size:9px;color:var(--t3);" id="home-scurve-range">—</span>
      </div>
      <div class="ch h280"><canvas id="ch-pva"></canvas></div>
    </div>

    <!-- Milestones -->
    <div class="pnl" style="padding:12px 14px;">
      <div class="ph2">
        <div class="pt" style="font-weight:700;">📅 Scheduled Milestones</div>
        <button class="btn bts" style="font-size:8px;" onclick="openMilestoneForm()">+ Add</button>
      </div>
      <div id="home-milestones" style="font-size:10px;"></div>
    </div>
  </div>

  <!-- ── ROW 4 REMOVED: Daily Progress Feed and Submit Daily Progress sections
       were removed per requirement. They are no longer part of the dashboard. -->

  <!-- ── ROW 5: PROJECT GANTT (Site Manager edits via openGanttEditor) ── -->
  <div class="pnl" id="home-gantt-wrap" style="scroll-margin-top:100px;">
    <div class="ph2">
      <div class="pt" style="font-weight:700;">📅 Project Gantt — Planned vs Actual</div>
      <div style="display:flex;gap:6px;">
        <button class="btn bts" style="font-size:8px;background:var(--ac);color:var(--bg);border:none;font-weight:600;"
                onclick="reqLogin('all',openGanttEditor)" data-tt="Site Manager only — edit Gantt activities">✏️ Edit Gantt</button>
        <button class="btn bts" style="font-size:8px;" onclick="openDrilldown('Gantt Help','Click a bar to drill down into timeline detail. Site Manager can edit activities via ✏️ Edit Gantt.')" data-tt="How to use the Gantt">ℹ️ Help</button>
      </div>
    </div>
    <div id="home-gantt"></div>
  </div>

</div><!-- /view-home -->

</template>

<!-- ───────────────────────────────────────────────────────────────
     Firebase Compat SDKs — DB + Storage only.
     FIX 4 — firebase-auth-compat.js intentionally NOT loaded:
     this app uses a hardcoded password gate in js/auth.js, not
     Firebase Authentication. Removing the script trims ~70 KB
     and prevents any code from accidentally calling
     firebase.auth() in the future.
     ─────────────────────────────────────────────────────────── -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<!-- ───────────────────────────────────────────────────────────────
     v9 core layer  (load order matters)
     1. firebase.js     → exposes fbDB / fbAuth / fbStorage
     2. dom.js          → esc(), el(), safeHTML()
     3. auth.js         → window.auth.signIn / requireRole
     4. data-api.js     → window.dataApi.* (Firebase writes)
     5. realtime.js     → window.realtime.* (Firebase listeners)
     6. storage.js      → window.storage.* (Firebase Storage uploads)
     7. state.js        → window.appState + appStore (single source of truth)
     8. data.js         → window.DB (legacy shape used by renderers)
     9. state-bridge.js → wires Firebase → appState → DB → re-render
    10. renderers       → read DB, write via dataApi.*
    11. loader.js       → boots the UI
     ─────────────────────────────────────────────────────────────── -->
<script src="js/firebase.js"></script>
<script src="js/dom.js"></script>
<script src="js/auth.js"></script>
<script src="js/data-api.js"></script>
<script src="js/realtime.js"></script>
<script src="js/storage.js"></script>
<script src="js/state.js"></script>

<script src="js/data.js"></script>
<script src="js/state-bridge.js"></script>

<script src="js/calc.js"></script>
<script src="js/charts.js"></script>
<script src="js/live-charts.js"></script>
<script src="js/date-picker.js"></script>
<script src="js/nav.js"></script>
<script src="js/render-home.js"></script>
<script src="js/render-solar.js"></script>
<script src="js/wtg-structure.js"></script>
<script src="js/solar-structure.js"></script>
<script src="js/solar-gis-data.js"></script>
<script src="js/project-creator.js"></script>
<script src="js/render-wtg.js"></script>
<script src="js/render-land.js"></script>
<script src="js/render-bop.js"></script>
<script src="js/render-misc.js"></script>
<script src="js/advanced.js"></script>
<script src="js/user-panel.js"></script>
<script src="js/notify.js"></script>
<script src="js/ui-live.js"></script>
<script src="js/loader.js"></script>

<!--
  Architecture: Firebase Realtime DB is the SINGLE source of truth.
  • All writes go through dataApi.* (data-api.js) which writes to Firebase.
  • All reads come from realtime.* (realtime.js) which feeds appStore (state.js).
  • appStore mirrors into the legacy `window.DB` shape (state-bridge.js)
    so existing renderers keep working without rewriting them.
  • UI re-renders automatically whenever appState changes.
  No legacy local-only saves. No no-op scheduleSave. No data overwrite bugs.
-->
