<div id="tb">
  <button id="tbt" onclick="toggleSB()" data-tt="Collapse / expand sidebar">☰</button>
  <div id="bc">
    <span class="bci last" style="display:flex;align-items:center;gap:8px;">
      <img src="continuumlogo.png" style="height:22px;object-fit:contain;vertical-align:middle;" onerror="this.style.display='none'">
      <span style="color:#1565c0;font-weight:800;">Continuum</span>
      <span style="color:var(--t3);font-size:9px;">|</span>
      <span style="color:var(--t2);font-size:9px;">Shubh Wind Energy Pvt Ltd – 140MW Hybrid EPC</span>
    </span>
  </div>
  <div class="tbr">
    <!-- Search -->
    <button class="btn bts" onclick="openSearch()" data-tt="Global search — Ctrl+K" style="gap:5px;">
      🔍 <kbd style="font-size:7px;background:var(--b1);border-radius:3px;padding:1px 4px;color:var(--t3);">Ctrl+K</kbd>
    </button>
    <!-- Date badge -->
    <div style="font-size:9px;color:var(--t3);background:var(--card);border:1px solid var(--b1);padding:3px 9px;border-radius:5px;">
      📅 <span id="today-date">02-May-2026</span>
    </div>
    <!-- Theme toggle -->
    <div class="theme-btn" onclick="toggleTheme()" data-tt="Toggle Dark / Light mode">
      <div class="theme-orb" id="adv-theme-orb">🌙</div>
      <span class="theme-lbl" id="adv-theme-lbl">Dark</span>
    </div>
    <!-- Export -->
    <button class="btn btn-pdf bts" onclick="exportToPDF('SWPPL EPC Dashboard')" data-tt="Export current page as PDF">📄 PDF</button>
    <button class="btn btn-csv bts" onclick="exportToCSV('SWPPL EPC Dashboard')" data-tt="Export all tables as CSV / Excel">📊 Excel</button>
    <!-- Firebase live-connection status pill (drives off /.info/connected in firebase.js) -->
    <span id="fb-status-pill" class="btn bts" data-tt="Live connection to Firebase Realtime Database"
          style="gap:5px;font-weight:600;cursor:default;background:transparent;border:1px solid var(--b1);">
      ☁️ Online
    </span>
    <!-- Edit unlock — opens password prompt; not real auth, demo only -->
    <button id="auth-login-btn" class="btn bta bts" onclick="auth.openLogin()" data-tt="Enter demo password to enable edits in this tab" style="gap:5px;font-weight:600;">
      🔓 Unlock edits
    </button>
    <button id="auth-user-btn" class="btn bts" onclick="openUserPanel()" data-tt="Demo user info" style="gap:5px;font-weight:600;display:none;">
      👤 <span id="auth-user-name">—</span>
    </button>
    <button id="auth-logout-btn" class="btn bts" onclick="authLogoutClick()" data-tt="Lock edits in this tab" style="display:none;">
      🔒 Lock edits
    </button>
  </div>
</div>
