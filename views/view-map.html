<div class="view" id="view-map">
  <div class="bk" onclick="nav('home')">← Dashboard</div>
  <div class="ph"><div class="pht">🗺️ Site Map – Kudligi, KA</div><div class="phs">WTG locations + Solar Block-2 (Jermali) + BOP lines | Click markers</div></div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:9px;align-items:center;">
    <div style="display:flex;gap:4px;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:8px;padding:4px 8px;">
      <span style="font-size:9px;color:var(--mu);font-weight:700;">FILTER:</span>
      <button class="map-fbtn active" data-flt="all"   onclick="filterMap('all')">🌐 All</button>
      <button class="map-fbtn"        data-flt="wtg"   onclick="filterMap('wtg')">🌬️ WTG</button>
      <button class="map-fbtn"        data-flt="solar" onclick="filterMap('solar')">☀️ Solar</button>
      <button class="map-fbtn"        data-flt="33kv"  onclick="filterMap('33kv')">🔋 33kV</button>
      <button class="map-fbtn"        data-flt="66kv"  onclick="filterMap('66kv')">🔌 66kV</button>
    </div>
    <span class="chip cg">🟢 Ready</span><span class="chip cb">🔵 Cast</span><span class="chip cy">🟡 WIP</span><span class="chip cr">🔴 ROW/Issue</span>
  </div>

  <style>
    .map-fbtn{background:transparent;border:1px solid var(--bd);color:var(--tx);font-size:9px;font-weight:700;padding:4px 9px;border-radius:6px;cursor:pointer;transition:.15s;}
    .map-fbtn:hover{background:rgba(255,255,255,.06);border-color:var(--ac);}
    .map-fbtn.active{background:var(--ac);color:#fff;border-color:var(--ac);box-shadow:0 0 6px rgba(0,200,255,.4);}
  </style>

  <div id="sitemap"></div>
</div>
