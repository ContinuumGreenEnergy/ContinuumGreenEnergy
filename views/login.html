<div id="lw" class="lw" style="display:none;">
  <div class="lb">
    <div class="li" id="l-i">🔐</div>
    <div class="lt" id="l-t">Sign In</div>
    <div class="ls" id="l-s">Authentication required</div>

    <div class="fg" style="text-align:left;margin-top:4px;">
      <label class="fl">Email</label>
      <input class="fi" id="l-u" type="email" autocomplete="username"
             placeholder="you@swppl.demo">
    </div>
    <div class="fg" style="text-align:left;">
      <label class="fl">Password</label>
      <input class="fi" id="l-p" type="password" autocomplete="current-password"
             placeholder="Password"
             onkeydown="if(event.key==='Enter')auth.doLoginForm()">
    </div>

    <div class="le" id="l-e"></div>

    <div style="display:flex;gap:7px;margin-top:7px;">
      <button class="btn"     style="flex:1;" onclick="auth.closeLogin()">Cancel</button>
      <button class="btn bta" style="flex:1;" onclick="auth.doLoginForm()">Sign In →</button>
    </div>

    <div style="margin-top:9px;padding:7px;background:var(--card3);border-radius:6px;
                font-size:8px;color:var(--t3);text-align:left;line-height:1.5;">
      <b>Demo accounts</b> (set up in Firebase Auth + /users tree):<br>
      admin@swppl.demo · solar@swppl.demo · wtg@swppl.demo · bop@swppl.demo · view@swppl.demo
    </div>
  </div>
</div>
