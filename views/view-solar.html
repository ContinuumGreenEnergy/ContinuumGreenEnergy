<div class="view" id="view-solar" style="position:relative;">
  <div class="bk" onclick="nav('home')">← Dashboard</div>
  <div class="ph">
    <div class="pht" style="color:var(--sol);display:flex;align-items:center;gap:8px;">
      <img src="solar.png" style="height:26px;object-fit:contain;vertical-align:middle;" onerror="this.style.display='none'">
      Solar 70.4 MW total | 6 ITCs (13.2×4 + 8.8×2)
    </div>
  </div>
  <div id="sol-dp-bar"></div>
  <div class="kr" id="sol-kr"></div>

  <!-- ── LIVE SOLAR FIELD — animated sun + ITC panel arrays ──
       Panel cells fill with live progress; energy flows to the
       inverter node; click an ITC array to open its detail. -->
  <div class="pnl farm-panel" id="solar-field-wrap" style="margin-bottom:14px;padding:12px 14px;">
    <div class="ph2" style="margin-bottom:8px;">
      <div class="pt" style="font-weight:800;">🔆 Live Solar Field — panels fill with realtime progress</div>
      <span style="font-size:9px;color:var(--t3);">Click any ITC array to open its activity detail</span>
    </div>
    <div id="solar-field"></div>
  </div>

  <!-- ── ITC ROWS (full-width, replaces small 6-up grid) ── -->
  <div class="ph2" style="margin-bottom:8px;">
    <div class="pt">ITC Summary — Click any ITC for activity detail</div>
  </div>
  <div class="itcg-rows" id="itc-cards"></div>

  <!-- ── POD / Daily Work Sub-section (Solar only) ── -->
  <div class="pnl" id="sol-pod-section" style="margin-top:14px;scroll-margin-top:100px;padding:12px 14px;">
    <div class="ph2" style="margin-bottom:10px;">
      <div class="pt" style="font-weight:700;">📋 Solar — POD &amp; Daily Work Status (Today)</div>
      <button class="btn btsol bts" onclick="nav('pod')">+ Submit POD</button>
    </div>
    <div id="sol-pod-list"></div>
  </div>

  <!-- ── Next Day Plan editor (Solar) ── -->
  <div class="pnl ndp-card" id="sol-ndp-section" style="scroll-margin-top:100px;">
    <div class="ph2">
      <div class="pt" style="font-weight:700;">➜ Solar — Next Day Plan (Tomorrow)</div>
      <button class="btn btsol bts" onclick="reqLogin('solar', openSolarNdpForm)">+ Add Next Day Plan</button>
    </div>
    <div id="sol-ndp-list" class="ndp-list"></div>
  </div>
</div>
